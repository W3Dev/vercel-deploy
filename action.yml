name: 'Deploy for Vercel'
description: 'Deploy preview and production environments to Vercel'
author: 'W3Dev'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  vercel_token:
    description: 'Vercel API token'
    required: true
  vercel_org_id:
    description: 'Vercel Organization/Team ID'
    required: true
  vercel_project_id:
    description: 'Vercel Project ID'
    required: true
  vercel_project_name:
    description: 'Vercel Project name (for linking)'
    required: false
    default: ''
  package_manager:
    description: 'Package manager to use (bun, yarn, npm, pnpm)'
    required: false
    default: 'bun'
  node_version:
    description: 'Node.js version'
    required: false
    default: '22'
  working_directory:
    description: 'Working directory for the build'
    required: false
    default: '.'
  alias_prefix:
    description: 'Prefix for preview alias (e.g., "myapp" creates pr-123--myapp.vercel.app)'
    required: false
    default: ''
  alias_domain:
    description: 'Custom domain for the preview alias (e.g., "preview.example.com" creates pr-123--myapp.preview.example.com instead of pr-123--myapp.vercel.app)'
    required: false
    default: ''
  prebuild_script:
    description: 'Optional script to run before build (e.g., configure git author)'
    required: false
    default: ''
  install_command:
    description: 'Custom install command (overrides package_manager default)'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}
  environment:
    description: 'Deployment environment (preview or production)'
    required: false
    default: 'preview'
  predeploy_script:
    description: 'Optional script to run before deployment'
    required: false
    default: ''
  deploy_args:
    description: 'Space-separated additional arguments to pass to `vercel deploy --prebuilt` (e.g., `--archive=tgz --meta key=value`)'
    required: false
    default: ''
  teardown:
    description: 'Remove preview alias when PR is closed'
    required: false
    default: 'false'
  auto_clean_deployment:
    description: 'Also delete the deployment itself (not just alias) on teardown'
    required: false
    default: 'false'

outputs:
  deployment_url:
    description: 'The Vercel deployment URL'
    value: ${{ steps.deploy.outputs.url }}
  alias_url:
    description: 'The aliased preview URL'
    value: ${{ steps.deploy.outputs.alias_url }}
  pr_number:
    description: 'The PR number (if applicable)'
    value: ${{ steps.context.outputs.pr_number }}

runs:
  using: 'composite'
  steps:
    - name: Determine context
      id: context
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        ALIAS_PREFIX: ${{ inputs.alias_prefix }}
        ALIAS_DOMAIN: ${{ inputs.alias_domain }}
        REPO_NAME: ${{ github.event.repository.name }}
      run: |
        echo "is_production=${{ inputs.environment == 'production' }}" >> $GITHUB_OUTPUT

        # Skip alias generation for production deployments
        if [ "$ENVIRONMENT" == "production" ]; then
          echo "pr_number=" >> $GITHUB_OUTPUT
          echo "preview_alias=" >> $GITHUB_OUTPUT
        elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            # Generate alias if either alias_prefix or alias_domain is set
            if [ -n "$ALIAS_PREFIX" ] || [ -n "$ALIAS_DOMAIN" ]; then
              EFFECTIVE_PREFIX="${ALIAS_PREFIX:-$REPO_NAME}"
              echo "preview_alias=pr-${{ github.event.inputs.pr_number }}--${EFFECTIVE_PREFIX}" >> $GITHUB_OUTPUT
            else
              echo "preview_alias=" >> $GITHUB_OUTPUT
            fi
          else
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "preview_alias=" >> $GITHUB_OUTPUT
          fi
        else
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          # Generate alias if either alias_prefix or alias_domain is set
          if [ -n "$ALIAS_PREFIX" ] || [ -n "$ALIAS_DOMAIN" ]; then
            EFFECTIVE_PREFIX="${ALIAS_PREFIX:-$REPO_NAME}"
            echo "preview_alias=pr-${{ github.event.pull_request.number }}--${EFFECTIVE_PREFIX}" >> $GITHUB_OUTPUT
          else
            echo "preview_alias=" >> $GITHUB_OUTPUT
          fi
        fi

    - name: Check for teardown
      id: teardown_check
      shell: bash
      run: |
        if [ "${{ inputs.teardown }}" == "true" ] && [ "${{ github.event.action }}" == "closed" ]; then
          echo "should_teardown=true" >> $GITHUB_OUTPUT
        else
          echo "should_teardown=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node.js
      if: steps.teardown_check.outputs.should_teardown != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Bun
      if: steps.teardown_check.outputs.should_teardown != 'true' && inputs.package_manager == 'bun'
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Setup pnpm
      if: steps.teardown_check.outputs.should_teardown != 'true' && inputs.package_manager == 'pnpm'
      uses: pnpm/action-setup@v4

    - name: Enable Corepack (for Yarn)
      if: inputs.package_manager == 'yarn'
      shell: bash
      run: corepack enable

    - name: Install dependencies
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        INSTALL_CMD: ${{ inputs.install_command }}
        PKG_MANAGER: ${{ inputs.package_manager }}
      run: |
        if [ -n "$INSTALL_CMD" ]; then
          eval "$INSTALL_CMD"
        elif [ "$PKG_MANAGER" == "bun" ]; then
          bun install
        elif [ "$PKG_MANAGER" == "yarn" ]; then
          yarn install --immutable
        elif [ "$PKG_MANAGER" == "pnpm" ]; then
          pnpm install
        else
          npm ci
        fi

    - name: Install Vercel CLI
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      env:
        PKG_MANAGER: ${{ inputs.package_manager }}
      run: |
        if [ "$PKG_MANAGER" == "bun" ]; then
          bun install -g vercel
        elif [ "$PKG_MANAGER" == "pnpm" ]; then
          pnpm install -g vercel
        else
          # Use npm for yarn and npm (yarn doesn't support global installs well)
          npm install -g vercel
        fi

    - name: Run prebuild script
      if: steps.teardown_check.outputs.should_teardown != 'true' && inputs.prebuild_script != ''
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ inputs.prebuild_script }}

    - name: Setup Vercel project linking
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        PROJECT_NAME: ${{ inputs.vercel_project_name }}
        REPO_NAME: ${{ github.event.repository.name }}
      run: |
        rm -rf .vercel
        mkdir -p .vercel
        FINAL_NAME="${PROJECT_NAME:-$REPO_NAME}"
        echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\",\"projectName\":\"$FINAL_NAME\"}" > .vercel/project.json
        cat .vercel/project.json

    - name: Pull Vercel environment
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
      run: vercel pull --yes --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

    - name: Build with Vercel
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        if [ "$ENVIRONMENT" == "production" ]; then
          vercel build --prod --token=$VERCEL_TOKEN
        else
          vercel build --token=$VERCEL_TOKEN
        fi

    - name: Run predeploy script
      if: steps.teardown_check.outputs.should_teardown != 'true' && inputs.predeploy_script != ''
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ inputs.predeploy_script }}

    - name: Deploy to Vercel
      id: deploy
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        PREVIEW_ALIAS: ${{ steps.context.outputs.preview_alias }}
        ENVIRONMENT: ${{ inputs.environment }}
        DEPLOY_ARGS: ${{ inputs.deploy_args }}
        ALIAS_DOMAIN: ${{ inputs.alias_domain }}
      run: |
        DEPLOY_CMD=(vercel deploy --prebuilt --token=$VERCEL_TOKEN)

        if [ "$ENVIRONMENT" == "production" ]; then
          DEPLOY_CMD+=(--prod)
        fi

        if [ -n "$DEPLOY_ARGS" ]; then
          if [[ "$DEPLOY_ARGS" == *$'\n'* || "$DEPLOY_ARGS" == *$'\r'* ]]; then
            echo "deploy_args must be provided as a single-line argument string" >&2
            exit 1
          fi
          PARSED_DEPLOY_ARGS=$(xargs -n1 printf '%s\n' <<< "$DEPLOY_ARGS") || {
            echo "Failed to parse deploy_args. Ensure arguments are properly formatted as a single-line string." >&2
            exit 1
          }
          if [ -n "$PARSED_DEPLOY_ARGS" ]; then
            mapfile -t DEPLOY_ARGS_ARRAY <<< "$PARSED_DEPLOY_ARGS"
            DEPLOY_CMD+=("${DEPLOY_ARGS_ARRAY[@]}")
          fi
        fi

        DEPLOYMENT_URL=$("${DEPLOY_CMD[@]}")
        echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

        if [ -n "$PREVIEW_ALIAS" ]; then
          EFFECTIVE_DOMAIN="${ALIAS_DOMAIN:-vercel.app}"
          ALIAS_FQDN="${PREVIEW_ALIAS}.${EFFECTIVE_DOMAIN}"
          vercel alias set "$DEPLOYMENT_URL" "$ALIAS_FQDN" --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID || true
          echo "alias_url=https://${ALIAS_FQDN}" >> $GITHUB_OUTPUT
        fi

    - name: Add deployment summary
      if: steps.teardown_check.outputs.should_teardown != 'true'
      shell: bash
      env:
        DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        ALIAS_URL: ${{ steps.deploy.outputs.alias_url }}
        COMMIT_SHA: ${{ github.sha }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        if [ "$ENVIRONMENT" == "production" ]; then
          echo "## ✅ Vercel Production Deployed" >> $GITHUB_STEP_SUMMARY
        else
          echo "## ✅ Vercel Preview Deployed" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| | |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| **Deployment URL** | $DEPLOYMENT_URL |" >> $GITHUB_STEP_SUMMARY
        if [ -n "$ALIAS_URL" ]; then
          echo "| **Alias URL** | $ALIAS_URL |" >> $GITHUB_STEP_SUMMARY
        fi
        echo "| **Commit** | \`$COMMIT_SHA\` |" >> $GITHUB_STEP_SUMMARY

    - name: Comment on PR
      if: steps.teardown_check.outputs.should_teardown != 'true' && steps.context.outputs.pr_number != '' && inputs.environment != 'production'
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        ALIAS_URL: ${{ steps.deploy.outputs.alias_url }}
        PROJECT_NAME: ${{ inputs.vercel_project_name }}
        REPO_NAME: ${{ github.event.repository.name }}
        COMMIT_SHA: ${{ github.sha }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const prNumber = parseInt(process.env.PR_NUMBER);
          const deploymentUrl = process.env.DEPLOYMENT_URL;
          const aliasUrl = process.env.ALIAS_URL;
          const projectName = process.env.PROJECT_NAME || process.env.REPO_NAME;
          const commitSha = process.env.COMMIT_SHA;
          const marker = `<!-- vercel-preview-${projectName} -->`;
          
          const commentBody = `${marker}

          🚀 **Preview Deployed!**

          | | |
          |---|---|
          | **Preview URL** | ${deploymentUrl} |
          ${aliasUrl ? `| **Alias URL** | ${aliasUrl} |` : ''}
          | **Commit** | \`${commitSha}\` |
          `;
          
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100
          });
          
          const existingComment = comments.find(comment => 
            comment.user.login === 'github-actions[bot]' && 
            comment.body.includes(marker)
          );
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
          }

    # Teardown steps
    - name: Install Vercel CLI (for teardown)
      if: steps.teardown_check.outputs.should_teardown == 'true'
      shell: bash
      run: npm install -g vercel

    - name: Get deployment URL from alias
      id: get_deployment
      if: steps.teardown_check.outputs.should_teardown == 'true' && inputs.auto_clean_deployment == 'true' && steps.context.outputs.preview_alias != ''
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        PREVIEW_ALIAS: ${{ steps.context.outputs.preview_alias }}
        ALIAS_DOMAIN: ${{ inputs.alias_domain }}
      run: |
        # Query Vercel API to get deployment URL linked to this alias
        EFFECTIVE_DOMAIN="${ALIAS_DOMAIN:-vercel.app}"
        ALIAS_FQDN="${PREVIEW_ALIAS}.${EFFECTIVE_DOMAIN}"
        RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
          "https://api.vercel.com/v4/aliases?teamId=$VERCEL_ORG_ID&domain=$ALIAS_FQDN")

        # Extract deployment ID from response
        DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -r '.aliases[0].deploymentId // empty')

        if [ -n "$DEPLOYMENT_ID" ]; then
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Found deployment: $DEPLOYMENT_ID"
        else
          echo "No deployment found for alias: $ALIAS_FQDN"
        fi

    - name: Remove alias
      id: remove_alias
      if: steps.teardown_check.outputs.should_teardown == 'true' && steps.context.outputs.preview_alias != ''
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        PREVIEW_ALIAS: ${{ steps.context.outputs.preview_alias }}
        ALIAS_DOMAIN: ${{ inputs.alias_domain }}
      run: |
        EFFECTIVE_DOMAIN="${ALIAS_DOMAIN:-vercel.app}"
        ALIAS_FQDN="${PREVIEW_ALIAS}.${EFFECTIVE_DOMAIN}"
        vercel alias rm "$ALIAS_FQDN" --yes --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID || true
        echo "Removed alias: ${ALIAS_FQDN}"

    - name: Delete deployment
      if: steps.teardown_check.outputs.should_teardown == 'true' && inputs.auto_clean_deployment == 'true' && steps.get_deployment.outputs.deployment_id != ''
      shell: bash
      env:
        VERCEL_TOKEN: ${{ inputs.vercel_token }}
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        DEPLOYMENT_ID: ${{ steps.get_deployment.outputs.deployment_id }}
      run: |
        # Delete deployment via API
        curl -X DELETE \
          "https://api.vercel.com/v13/deployments/$DEPLOYMENT_ID?teamId=$VERCEL_ORG_ID" \
          -H "Authorization: Bearer $VERCEL_TOKEN" || true
        echo "Deleted deployment: $DEPLOYMENT_ID"

    - name: Comment teardown on PR
      if: steps.teardown_check.outputs.should_teardown == 'true' && steps.context.outputs.pr_number != ''
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        PREVIEW_ALIAS: ${{ steps.context.outputs.preview_alias }}
        PROJECT_NAME: ${{ inputs.vercel_project_name }}
        REPO_NAME: ${{ github.event.repository.name }}
        DEPLOYMENT_ID: ${{ steps.get_deployment.outputs.deployment_id }}
        AUTO_CLEAN: ${{ inputs.auto_clean_deployment }}
        ALIAS_DOMAIN: ${{ inputs.alias_domain }}
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const prNumber = parseInt(process.env.PR_NUMBER);
          const previewAlias = process.env.PREVIEW_ALIAS;
          const projectName = process.env.PROJECT_NAME || process.env.REPO_NAME;
          const deploymentId = process.env.DEPLOYMENT_ID;
          const autoClean = process.env.AUTO_CLEAN === 'true';
          const aliasDomain = process.env.ALIAS_DOMAIN || 'vercel.app';
          const marker = `<!-- vercel-preview-${projectName} -->`;

          let details = `| **Removed Alias** | ${previewAlias}.${aliasDomain} |`;
          if (autoClean && deploymentId) {
            details += `\n| **Deleted Deployment** | ${deploymentId} |`;
          }

          const commentBody = `${marker}

          ♻️ **Preview Deployment Removed**

          The preview deployment for this PR has been cleaned up since the PR was closed.

          | | |
          |---|---|
          ${details}
          `;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100
          });

          const existingComment = comments.find(comment =>
            comment.user.login === 'github-actions[bot]' &&
            comment.body.includes(marker)
          );

          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
          }
